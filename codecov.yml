# Codecov configuration for mononet
# Documentation: https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Set precision of coverage measurement (0-5 decimal places)
  precision: 2

  # Coverage thresholds
  range: "70...100"

  # Round coverage to nearest specified value
  round: down

  status:
    # Project-level coverage status
    project:
      default:
        # Require 100% overall coverage - no decrease allowed
        threshold: 0%
        # Target 100% coverage for entire codebase
        target: 100%
        # Fail CI if coverage is below target
        if_ci_failed: error
        # Fail if coverage decreases at all
        if_not_found: failure

    # Patch-level coverage status (new code in PR)
    patch:
      default:
        # Require 100% coverage for all new code
        threshold: 100%
        target: 100%
        # Only consider new lines in the patch
        only_pulls: true
        # Fail CI if patch coverage is below 100%
        if_ci_failed: error
        if_not_found: failure

# Comment configuration for PR comments
comment:
  # Layout for PR comments
  layout: "header, diff, flags, files, footer"

  # Behavior settings
  behavior: default

  # Require changes for comment posting
  require_changes: false

  # Include base coverage comparison
  require_base: true

  # Include head coverage
  require_head: true

  # Show coverage delta
  show_carryforward_flags: false

# GitHub integration
github_checks:
  annotations: true

# Ignore paths for coverage calculation
ignore:
  - "tests/**/*"
  - "**/__pycache__/**/*"
  - "**/migrations/**/*"
  - "htmlcov/**/*"
  - "docs/**/*"
  - "tools/**/*"
  - "k8s/**/*"
  - "*.md"
  - "*.yml"
  - "*.yaml"
  - "*.toml"
  - "*.ini"
  - "*.cfg"
  - "*.txt"

# Flags for different parts of the codebase (optional)
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 100%
        threshold: 0%
      - type: patch
        target: 100%
        threshold: 100%

# Notification settings
slack:
  # Add Slack webhook if needed
  # url: "https://hooks.slack.com/services/..."

# Advanced settings
fixes:
  # Define path fixes if needed
  # - "::src/"
