name: Build

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e ".[all]" --group=dev --group=lint
      - name: Run static analysis
        run: ./tools/static-analysis.sh

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e ".[all]" --group=dev --group=lint
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --hook-stage manual --all-files

  docs-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e ".[all]" --group=docs
      - name: Build docs (strict)
        run: ./tools/build-docs.sh

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        backend: [torch, jax, keras]
        include:
          - { os: macos-latest,   python-version: "3.13", backend: torch }
          - { os: macos-latest,   python-version: "3.13", backend: jax }
          - { os: macos-latest,   python-version: "3.13", backend: keras }
          - { os: windows-latest, python-version: "3.13", backend: torch }
          - { os: windows-latest, python-version: "3.13", backend: jax }
          - { os: windows-latest, python-version: "3.13", backend: keras }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system -e ".[${{ matrix.backend }}]" --group=dev --group=bench
      - name: Run tests
        env:
          MONONET_TEST_BACKEND: ${{ matrix.backend }}
          KERAS_BACKEND: jax
        run: pytest tests/core "tests/${{ matrix.backend }}" tests/equivalence tests/benchmarks tests/test_top_level_imports.py -v

  check:
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    needs: [static-analysis, pre-commit, docs-smoke, test]
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1 # nosemgrep
        with:
          jobs: ${{ toJSON(needs) }}
