version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: "daily"
      time: "00:00"
    cooldown:
      default-days: 3
    ignore:
      - dependency-name: "torch"
      - dependency-name: "jax"
      - dependency-name: "flax"
      - dependency-name: "keras"
    groups:
      lint:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "ruff*"
          - "mypy*"
          - "bandit*"
          - "semgrep*"
          - "codespell*"
          - "detect-secrets*"
          - "pre-commit*"
          - "types-*"
      docs:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "sphinx*"
          - "pydata-sphinx-theme*"
          - "myst-nb*"
          - "linkify-it-py*"
          - "cairosvg*"
      dev:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "pytest*"
          - "hypothesis*"
          - "ipython*"
          - "ipykernel*"
          - "nest-asyncio*"
      bench:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "scikit-learn*"
          - "pandas*"
          - "matplotlib*"
      tooling:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "*"
      production:
        applies-to: version-updates
        dependency-type: "production"
        patterns:
          - "*"
      development-security:
        applies-to: security-updates
        dependency-type: "development"
        patterns:
          - "*"
      production-security:
        applies-to: security-updates
        dependency-type: "production"
        patterns:
          - "*"
