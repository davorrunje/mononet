version: '3'
name: mononet-devcontainer

services:
  python-3.13-mononet:  # nosemgrep
    image: mcr.microsoft.com/devcontainers/python:3.13
    container_name: mononet-${USER}-python-3.13
    pull_policy: always
    volumes:
      - ../../:/workspaces/mononet:cached
    command: sleep infinity
    env_file:
      # devcontainer.env.tmp is generated by the devcontainer.json from devcontainer.env file.
      - ./devcontainer.env.tmp
    networks:
      - mononet-network

networks:
  mononet-network:
    name: mononet-${USER}-network
